<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https://public.api.aibo.com; img-src 'self'; font-src 'self';">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#ff6b9d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ab_behave</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🐕 ab_behave</h1>
      <p id="headerStatus">設定が必要です</p>
    </header>

    <!-- 設定カード -->
    <div class="card">
      <div class="settings-toggle" id="settingsToggle">
        <h2 style="margin:0;">⚙️ 設定</h2>
        <span id="settingsArrow">▼</span>
      </div>
      <div class="settings-content" id="settingsContent">
        <div class="input-group">
          <label>アクセストークン</label>
          <input type="password" id="tokenInput" placeholder="トークンを入力">
        </div>
        <div class="button-row">
          <button class="btn btn-primary" id="saveTokenBtn">保存</button>
          <button class="btn btn-secondary" id="fetchDevicesBtn">接続テスト</button>
        </div>
        <div class="device-info" id="deviceInfo" style="display:none;">
          <strong>接続中:</strong><br>
          <span id="deviceName">-</span>
        </div>
      </div>
    </div>

    <!-- 未設定時の表示 -->
    <div class="card" id="setupRequired">
      <div class="setup-required">
        <div class="emoji">🔧</div>
        <p>まず上の「設定」を開いて、<br>アクセストークンを入力してください。</p>
      </div>
    </div>

    <!-- タブ付きパネル -->
    <div class="hidden" id="actionPanel">
      <!-- タブヘッダー -->
      <div class="tab-header">
        <button class="tab-btn active" id="tabInfo">📊 情報取得</button>
        <button class="tab-btn" id="tabAction">🎮 アクション</button>
      </div>

      <!-- 情報取得タブ -->
      <div class="card tab-content active" id="tabContentInfo">
        <h2>🔋 バッテリー状態</h2>
        <div class="hungry-status-section">
          <div class="hungry-status-display" id="hungryStatusDisplay">
            <div class="hungry-status-icon" id="hungryStatusIcon">🔋</div>
            <div class="hungry-status-label" id="hungryStatusLabel">未取得</div>
            <div class="hungry-status-desc" id="hungryStatusDesc">ボタンを押して状態を確認してください</div>
          </div>
          <button class="btn btn-primary hungry-check-btn" id="hungryCheckBtn">
            バッテリー状態を確認
          </button>
        </div>
        <h2 style="margin-top: 24px;">😪 眠さ状態</h2>
        <div class="sleepy-status-section">
          <div class="sleepy-status-display" id="sleepyStatusDisplay">
            <div class="sleepy-status-icon" id="sleepyStatusIcon">😪</div>
            <div class="sleepy-status-label" id="sleepyStatusLabel">未取得</div>
            <div class="sleepy-status-desc" id="sleepyStatusDesc">ボタンを押して状態を確認してください</div>
          </div>
          <button class="btn btn-primary sleepy-check-btn" id="sleepyCheckBtn">
            眠さ状態を確認
          </button>
        </div>
        <div class="status" id="infoStatus"></div>
      </div>

      <!-- アクション実行タブ -->
      <div class="card tab-content" id="tabContentAction">
        <div class="mode-section">
          <h2>📋 モード切替</h2>
          <button class="mode-btn standby" id="modeBtn">
            ⏸️ 指示待ちにする
          </button>
        </div>

        <div class="posture-section">
          <h2>🐾 姿勢を変える</h2>
          <div class="action-grid">
            <button class="action-btn posture-btn" data-posture="stand">
              <span class="emoji">🧍</span>
              立つ
            </button>
            <button class="action-btn posture-btn" data-posture="stand_straight">
              <span class="emoji">📐</span>
              まっすぐ立つ
            </button>
            <button class="action-btn posture-btn" data-posture="sit">
              <span class="emoji">🪑</span>
              すわる
            </button>
            <button class="action-btn posture-btn" data-posture="sit_and_raise_both_hands">
              <span class="emoji">🙌</span>
              両前足あげる
            </button>
            <button class="action-btn posture-btn" data-posture="down">
              <span class="emoji">⬇️</span>
              伏せる
            </button>
            <button class="action-btn posture-btn" data-posture="crouch">
              <span class="emoji">🦆</span>
              しゃがむ
            </button>
            <button class="action-btn posture-btn" data-posture="down_and_lengthen_behind">
              <span class="emoji">😴</span>
              寝転がる
            </button>
            <button class="action-btn posture-btn" data-posture="down_and_shorten_behind">
              <span class="emoji">🛌</span>
              足を曲げて寝転がる
            </button>
            <button class="action-btn posture-btn" data-posture="sleep">
              <span class="emoji">💤</span>
              寝る姿勢
            </button>
            <button class="action-btn posture-btn" data-posture="back">
              <span class="emoji">🔄</span>
              おなかを見せる
            </button>
          </div>
        </div>

        <div class="motion-section">
          <h2>🎮 ふるまい</h2>
          <div id="motionAccordion"></div>
        </div>

        <div class="trick-section">
          <h2>🎪 トリック</h2>
          <p class="trick-note">aiboが覚えているトリックのみ実行できます</p>
          <div class="action-grid" id="trickGrid"></div>
        </div>

        <div class="move-head-section">
          <h2>🐕 首を動かす</h2>
          <div class="action-grid" id="moveHeadPresetGrid"></div>
          <div class="move-head-custom-toggle" id="moveHeadCustomToggle">
            <span>カスタム設定</span>
            <span id="moveHeadCustomArrow">▼</span>
          </div>
          <div class="move-head-custom" id="moveHeadCustom">
            <div class="slider-group">
              <label>左右 (Azimuth): <span id="azimuthValue">0</span>°</label>
              <input type="range" id="azimuthSlider" min="-80" max="80" value="0">
            </div>
            <div class="slider-group">
              <label>上下 (Elevation): <span id="elevationValue">0</span>°</label>
              <input type="range" id="elevationSlider" min="-40" max="40" value="0">
            </div>
            <div class="slider-group">
              <label>速さ (Velocity): <span id="velocityValue">40</span> deg/s</label>
              <input type="range" id="velocitySlider" min="10" max="80" value="40">
            </div>
            <button class="btn btn-primary move-head-execute-btn" id="moveHeadExecuteBtn">実行</button>
          </div>
        </div>

        <div class="status" id="actionStatus"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
